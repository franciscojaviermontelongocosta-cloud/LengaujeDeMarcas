<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <form id="form" class="form" action="/action.php" method="get">
            <h2> Register with Us</h2>

            <div class="form-control">
                <label for="edad"> Age </label>
                <input type="number" id="edad" name="edad" placeholder="Enter age">
                <small> Error message </small>
            </div>
           
            <div class="form-control">
                <label for="url"> Url </label>
                <input type="text" id="url" name="url" placeholder="Enter url">
                <small> Error message </small>
            </div>


            <div class="form-control">
                <label for="username"> Username </label>
                <input type="text" id="username" name="username" placeholder="Enter username">
                <small> Error message </small>
            </div>
            <div class="form-control">
                <label for="email"> E-mail </label>
                <input type="email" id="email" name="email" placeholder="Enter email">
                <small> Error message </small>
            </div>
            <div class="form-control">
                <label for="password"> Password </label>
                <input type="password" id="password" name="password" placeholder="Enter password">
                <small> Error message </small>
            </div>
            <div class="form-control">
                <label for="confirmpassword"> Confirm Password </label>
                <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Enter password again">
                <small> Error message </small>
            </div>
            <button type="submit">Submit</button>

        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
